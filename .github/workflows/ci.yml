name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: macos-14
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Check Swift availability
      run: swift --version

    - name: Compile Metal kernels
      run: |
        cd skmetal/skmetal_bridge
        bash compile_metal.sh

    - name: Build Swift Bridge
      run: |
        cd skmetal/skmetal_bridge
        swift build --configuration release

    - name: Copy artifacts into Python package
      run: |
        DYLIB="skmetal/skmetal_bridge/.build/arm64-apple-macosx/release/libSkMetalBridge.dylib"
        if [ ! -f "$DYLIB" ]; then
          DYLIB="skmetal/skmetal_bridge/.build/release/libSkMetalBridge.dylib"
        fi
        cp "$DYLIB" skmetal/skmetal/libSkMetalBridge.dylib
        BUNDLE="skmetal/skmetal_bridge/.build/arm64-apple-macosx/release/SkMetalBridge_SkMetalBridge.bundle"
        if [ -d "$BUNDLE" ]; then
          cp -R "$BUNDLE" skmetal/skmetal/SkMetalBridge_SkMetalBridge.bundle
        fi

    - name: Install Python package
      run: |
        pip install -e "skmetal[dev]"

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check skmetal/ tests/

    - name: Run all tests
      run: |
        pytest tests/ -v --timeout=120

    - name: Benchmark regression check
      run: |
        python benchmarks/check_regression.py

    - name: Update baseline (main only)
      if: github.ref == 'refs/heads/main'
      run: |
        python benchmarks/check_regression.py --update
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add benchmarks/baseline.json
        git diff --quiet && git diff --staged --quiet || \
          git commit -m "chore: update benchmark baseline [skip ci]"
        git push
