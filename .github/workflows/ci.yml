name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Swift 6.1
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: "6.1"

    - name: Check Swift availability
      run: swift --version

    - name: Cache Swift build artifacts
      uses: actions/cache@v4
      with:
        path: skmetal/skmetal_bridge/.build
        key: swift-build-${{ runner.os }}-${{ hashFiles('skmetal/skmetal_bridge/Sources/**/*.swift', 'skmetal/skmetal_bridge/Sources/**/*.metal') }}
        restore-keys: |
          swift-build-${{ runner.os }}-

    - name: Compile Metal kernels
      run: |
        cd skmetal/skmetal_bridge
        bash compile_metal.sh

    - name: Build Swift Bridge
      run: |
        cd skmetal/skmetal_bridge
        swift build --configuration release

    - name: Copy artifacts into Python package
      run: |
        DYLIB="skmetal/skmetal_bridge/.build/arm64-apple-macosx/release/libSkMetalBridge.dylib"
        if [ ! -f "$DYLIB" ]; then
          DYLIB="skmetal/skmetal_bridge/.build/release/libSkMetalBridge.dylib"
        fi
        cp "$DYLIB" skmetal/skmetal/libSkMetalBridge.dylib
        BUNDLE="skmetal/skmetal_bridge/.build/arm64-apple-macosx/release/SkMetalBridge_SkMetalBridge.bundle"
        if [ -d "$BUNDLE" ]; then
          cp -R "$BUNDLE" skmetal/skmetal/SkMetalBridge_SkMetalBridge.bundle
        fi

    - name: Install Python package
      run: |
        pip install -e "skmetal[dev]"

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check skmetal/skmetal/ tests/
        ruff format --check skmetal/skmetal/ tests/

    - name: Run all tests with coverage
      run: |
        pytest tests/ -v --timeout=120 --cov=skmetal --cov-report=term-missing

    - name: Run benchmarks (fail on regression)
      run: |
        python benchmarks/run_compare.py
