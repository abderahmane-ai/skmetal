name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile Metal kernels
        run: |
          cd skmetal/skmetal_bridge
          bash compile_metal.sh

      - name: Build Swift Bridge
        run: |
          cd skmetal/skmetal_bridge
          swift build --configuration release

      - name: Copy artifacts into Python package
        run: |
          DYLIB="skmetal/skmetal_bridge/.build/arm64-apple-macosx/release/libSkMetalBridge.dylib"
          if [ ! -f "$DYLIB" ]; then
            DYLIB="skmetal/skmetal_bridge/.build/release/libSkMetalBridge.dylib"
          fi
          cp "$DYLIB" skmetal/skmetal/libSkMetalBridge.dylib
          BUNDLE="skmetal/skmetal_bridge/.build/arm64-apple-macosx/release/SkMetalBridge_SkMetalBridge.bundle"
          if [ -d "$BUNDLE" ]; then
            cp -R "$BUNDLE" skmetal/skmetal/SkMetalBridge_SkMetalBridge.bundle
          fi

      - name: Build universal2 wheel
        run: |
          pip install wheel
          cd skmetal
          python -m pip wheel . --no-deps -w dist/

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: skmetal-${{ matrix.python-version }}-wheel
          path: skmetal/dist/*.whl

  publish:
    needs: build
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: skmetal-*
          merge-multiple: true

      - name: Build Swift Bridge (for sdist)
        run: |
          cd skmetal/skmetal_bridge
          bash compile_metal.sh
          swift build --configuration release

      - name: Build sdist
        run: |
          pip install build
          cd skmetal
          python -m build --sdist --outdir dist/

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          pip install twine
          twine upload dist/*.whl dist/*.tar.gz --skip-existing

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
