name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build Swift Bridge
        run: |
          cd skmetal/skmetal_bridge
          swift build --configuration release

      - name: Build universal2 wheel
        run: |
          pip install wheel
          cd skmetal
          python -m pip wheel . --no-deps -w dist/

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: skmetal-${{ matrix.python-version }}-wheel
          path: skmetal/dist/*.whl

  publish:
    needs: build
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Swift Bridge
        run: |
          cd skmetal/skmetal_bridge
          swift build --configuration release

      - name: Build wheel
        run: |
          pip install build wheel twine
          cd skmetal
          python -m build --wheel --outdir dist/

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          twine upload skmetal/dist/*.whl --skip-existing

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: skmetal/dist/*.whl
          generate_release_notes: true
