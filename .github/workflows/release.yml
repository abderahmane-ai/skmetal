name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Swift 6.1
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Compile Metal kernels
        run: |
          cd skmetal_bridge
          bash compile_metal.sh

      - name: Build Swift Bridge
        run: |
          cd skmetal_bridge
          swift build --configuration release

      - name: Copy artifacts into Python package
        run: |
          DYLIB="skmetal_bridge/.build/arm64-apple-macosx/release/libSkMetalBridge.dylib"
          if [ ! -f "$DYLIB" ]; then
            DYLIB="skmetal_bridge/.build/release/libSkMetalBridge.dylib"
          fi
          cp "$DYLIB" skmetal/libSkMetalBridge.dylib
          BUNDLE="skmetal_bridge/.build/arm64-apple-macosx/release/SkMetalBridge_SkMetalBridge.bundle"
          if [ -d "$BUNDLE" ]; then
            cp -R "$BUNDLE" skmetal/SkMetalBridge_SkMetalBridge.bundle
          fi

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel --outdir dist/

      # Upload wheels with a consistent name pattern so the publish job can
      # download them all into a single dist/ directory.
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: skmetal-wheel
          path: dist/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    # The environment name MUST match the one configured on PyPI Trusted
    # Publisher settings exactly (including case). Create a GitHub Environment
    # called "pypi" in Settings → Environments before running this workflow.
    environment: pypi

    permissions:
      id-token: write   # required for OIDC trusted publishing
      contents: write   # required for softprops/action-gh-release

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Download all per-python wheels into dist/ so the publish action finds them.
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: skmetal-wheel
          path: dist/

      # Build sdist from the repository root (single pyproject.toml).
      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist --outdir dist/

      - name: List dist contents (debug)
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
